<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1000" viewBox="0 0 600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f0f"/><stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1000" fill="url(#bg)"/>
  <!-- Status bar -->
  <rect width="600" height="44" fill="#1a1f30"/>
  <text x="20" y="28" font-family="system-ui,sans-serif" font-size="12" fill="#e8ecf4">9:41</text>
  <text x="520" y="28" font-family="system-ui,sans-serif" font-size="12" fill="#e8ecf4">●●● 100%</text>
  <!-- App Header -->
  <rect x="0" y="44" width="600" height="64" fill="#1e2133"/>
  <text x="300" y="84" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#e8ecf4" text-anchor="middle">FireAlert</text>
  <!-- Hero section -->
  <rect x="0" y="108" width="600" height="200" fill="#7f1d1d" opacity=".25"/>
  <text x="300" y="190" font-family="system-ui,sans-serif" font-size="64" text-anchor="middle">🔥</text>
  <text x="300" y="250" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#fca5a5" text-anchor="middle">Emergency Response</text>
  <text x="300" y="278" font-family="system-ui,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Report · Verify · Alert</text>
  <!-- Buttons -->
  <rect x="40" y="332" width="520" height="72" rx="16" fill="#ef4444"/>
  <text x="300" y="366" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">🚨 REPORT FIRE EMERGENCY</text>
  <text x="300" y="390" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,.75)" text-anchor="middle">Tap to submit an emergency report</text>
  <rect x="40" y="420" width="248" height="64" rx="14" fill="#1e3a5f"/>
  <text x="164" y="448" font-family="system-ui,sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">📋 My Reports</text>
  <text x="164" y="468" font-family="system-ui,sans-serif" font-size="11" fill="#6b7494" text-anchor="middle">Track your submissions</text>
  <rect x="312" y="420" width="248" height="64" rx="14" fill="#1e3a5f"/>
  <text x="436" y="448" font-family="system-ui,sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">🔔 Active Alerts</text>
  <text x="436" y="468" font-family="system-ui,sans-serif" font-size="11" fill="#6b7494" text-anchor="middle">View live incidents</text>
  <!-- Recent activity -->
  <text x="40" y="518" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#e8ecf4">Recent Activity</text>
  <rect x="40" y="530" width="520" height="56" rx="10" fill="#1e2133"/>
  <text x="58" y="556" font-family="system-ui,sans-serif" font-size="13" fill="#fca5a5">🔥 Fire at Brgy. San Jose — VERIFIED</text>
  <text x="58" y="574" font-family="system-ui,sans-serif" font-size="11" fill="#6b7494">2 minutes ago</text>
  <rect x="40" y="596" width="520" height="56" rx="10" fill="#1e2133"/>
  <text x="58" y="622" font-family="system-ui,sans-serif" font-size="13" fill="#fbbf24">⏳ Report at Brgy. Tikay — PENDING</text>
  <text x="58" y="640" font-family="system-ui,sans-serif" font-size="11" fill="#6b7494">5 minutes ago</text>
  <text x="300" y="960" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.15)" text-anchor="middle">Replace with actual screenshot</text>
</svg>
